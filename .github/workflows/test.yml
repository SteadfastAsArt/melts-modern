name: Test

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  test:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install fastapi uvicorn pandas plotly pydantic openpyxl pytest
          export LD_LIBRARY_PATH=./lib

      - name: Run Python tests
        run: pytest tests/ -v
        env:
          LD_LIBRARY_PATH: ./lib

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Run JS tests
        run: |
          npm ci
          npx vitest run
